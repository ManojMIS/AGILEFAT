<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body { font: 12px sans-serif; background: #eee; margin: 10px; }
        .payslip { background: #fff; width: 300px; padding: 15px; border: 1px solid #ccc; margin: auto; }
        h2 { margin: 0; font-size: 16px; text-align: center; }
        p { margin: 5px 0; text-align: center; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .row { display: flex; justify-content: space-between; margin: 3px 0; }
        .bold { font-weight: bold; }
        .net { background: #2c3e50; color: #fff; padding: 8px; margin-top: 10px; text-align: right; }
        @media print { .btn { display: none; } }
    </style>
</head>
<body>
<div class="payslip">
    <h2>Company Name</h2>
    <p>Oct 2023 | John Doe (EMP123)</p>
    <div class="row bold"><span>Earnings</span><span>Deductions</span></div>
    <div class="row"><span>Basic: 5000</span><span>Tax: 800</span></div>
    <div class="net bold">NET PAY: $4,200</div>
    <button class="btn" onclick="window.print()" style="width:100%; margin-top:10px;">Print</button>
</div>
</body>
</html>
